#
# ms-app-deploy/action.yml
#
# Deploys a MAAF code app via `ms app deploy`. Three deploy modes are
# supported, selected based on inputs and the app's repoType from
# ms.config.json:
#
#   1. repoType:'none' + artifact-path supplied → `ms app deploy --artifact <zip>`
#      Uploads the pre-built zip and deploys it. Skips local pack.
#
#   2. repoType:'none' + no artifact-path → `ms app deploy`
#      CLI runs pack internally, zips, uploads, and deploys.
#      (Or, if the workflow already ran `ms-app-pack` earlier, the existing
#      .ms/packed/ artifact is reused.)
#
#   3. repoType:'native' / 'github' → `ms app deploy --commit <sha>`
#      Server-side build for the commit, then deploy.
#
# Requires @microsoft/managed-apps-cli >= 0.7.0 for `--artifact` support.
#
# The action reads `appId`, `environmentId`, and `repoType` from
# ms.config.json (written by `ms app create`).
#
# CALLER PREREQUISITES:
#   - install-ms-cli has run earlier in the job.
#   - For repoType:'none' without artifact-path: either `ms-app-pack` ran
#     earlier (with a prior `npm ci`), OR the CLI will pack internally.
#   - Tenant admin has enabled `AllowExternalArtifactDeployment` on the
#     target environment. Without it, deploy returns a policy error from
#     the RP. Wiki:
#     microsoft.ghe.com/bic/Managed-Ops-Internal/blob/main/docs/devops/MAAF/allowExternalArtifactDeployment-powershell.md
#
# ---------------------------------------------------------------------------
# Service Principal auth:
#   The auth inputs (`app-id`, `client-secret`, `tenant-id`) are wired to the
#   CLI's SPN env vars (MS_CLI_SP_* + MS_CLI_USE_SP_AUTH). The Power Apps RP
#   accepts Service Principal identities for MAAF operations. Provide all three
#   inputs together to deploy as the SPN with no developer in the loop.
# ---------------------------------------------------------------------------
#
# Example 1 — repoType:'none' with locally-built artifact:
#
#   - uses: actions/checkout@v5
#   - uses: actions/setup-node@v5
#     with: { node-version: '22' }
#   - run: npm ci
#     working-directory: 'maaf-apps'
#   - run: npm run build
#     working-directory: 'maaf-apps'
#   - run: cd maaf-apps && zip -r ../app.zip dist ms.config.json
#   - uses: microsoft/Managed-Apps/github-actions/install-ms-cli@v1
#   - uses: microsoft/Managed-Apps/github-actions/ms-app-deploy@v1
#     with:
#       working-directory: 'maaf-apps'
#       artifact-path: '../app.zip'
#       app-id:        ${{ secrets.PP_SP_CLIENT_ID }}
#       client-secret: ${{ secrets.PP_SP_CLIENT_SECRET }}
#       tenant-id:     ${{ secrets.PP_SP_TENANT_ID }}
#
# Example 2 — repoType:'none' letting the CLI pack internally:
#
#   - uses: actions/checkout@v5
#   - uses: actions/setup-node@v5
#     with: { node-version: '22' }
#   - run: npm ci
#     working-directory: 'maaf-apps'
#   - uses: microsoft/Managed-Apps/github-actions/install-ms-cli@v1
#   - uses: microsoft/Managed-Apps/github-actions/ms-app-deploy@v1
#     with:
#       working-directory: 'maaf-apps'
#       app-id:        ${{ secrets.PP_SP_CLIENT_ID }}
#       client-secret: ${{ secrets.PP_SP_CLIENT_SECRET }}
#       tenant-id:     ${{ secrets.PP_SP_TENANT_ID }}
#
name: 'ms-app-deploy'
description: 'Power Platform MS App Deploy — deploys a MAAF code app for the given commit'

inputs:
  # ── App context ───────────────────────────────────────────────────────────

  commit-sha:
    description: >
      Commit SHA to deploy for git-backed apps (repoType:'native' or
      'github'). Defaults to GITHUB_SHA. Ignored for repoType:'none' apps.
      Mutually exclusive with artifact-path.
    required: false
    default: ''

  artifact-path:
    description: >
      Path to a pre-built .zip artifact to upload and deploy. Only valid for
      repoType:'none' (escape-hatch / byoBuild) apps. Maps to `--artifact`
      on the CLI. Mutually exclusive with commit-sha.
    required: false
    default: ''

  cloud:
    description: >
      Cloud instance to target. One of: prod, test, preprod, preview,
      gccmoderate, dev. The MAAF end-to-end flow is currently supported only
      in 'test'. Maps to MS_CLI_CLOUD_INSTANCE.
    required: false
    default: 'test'

  working-directory:
    description: >
      Path to the app directory containing ms.config.json and package.json.
      Defaults to GITHUB_WORKSPACE.
    required: false
    default: ''

  # ── Service Principal authentication ──────────────────────────────────────
  # All three must be provided together to enable SPN mode. If any is empty,
  # the action will not set MS_CLI_USE_SP_AUTH and the CLI will fail with a
  # clear "not signed in" error rather than silently using a stale identity.

  app-id:
    description: 'SPN client ID. Maps to MS_CLI_SP_CLIENT_ID.'
    required: false
    default: ''

  client-secret:
    description: >
      SPN client secret. Maps to MS_CLI_SP_CLIENT_SECRET. Pass as a secret.
    required: false
    default: ''

  tenant-id:
    description: 'AAD tenant ID. Maps to MS_CLI_SP_TENANT_ID.'
    required: false
    default: ''

outputs:
  app-id:
    description: 'Deployed app id (GUID), parsed from `ms app deploy --json`.'

  environment-id:
    description: 'Environment id the app was deployed to.'

  commit-sha:
    description: 'The commit SHA that was deployed.'

runs:
  using: 'node24'
  main: '../dist/actions/ms-app-deploy/index.js'
